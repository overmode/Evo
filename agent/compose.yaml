services:
  agent:
    build: .
    stdin_open: true
    tty: true
    env_file: ../.env
    environment:
      - EVO_WORKSPACE=/workspace
    volumes:
      - workspace:/workspace
      # QMD GGUF models (~2GB total, downloaded on first run)
      - models:/home/evo/.cache/qmd/models

volumes:
  workspace:
  models:
