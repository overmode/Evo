services:
  agent:
    build: .
    stdin_open: true
    tty: true
    env_file: ../.env
    environment:
      - EVO_WORKSPACE=/workspace
    volumes:
      - workspace:/workspace
      # QMD GGUF models — bind-mount host cache so models are shared
      - ${HOME}/.cache/qmd/models:/home/evo/.cache/qmd/models

volumes:
  workspace:
